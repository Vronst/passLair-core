name: Centralized DevOps Pipeline

on:
  push:
    branches: [main, stage]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  # 1. PR Labeling: Runs only when PRs are opened/edited
  pr-labeling:
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'edited')
    uses: Vronst/workflows/.github/workflows/autolabel.yml@main

  # 2. Linting: Runs on normal branch pushes and PRs
  linting:
    if: github.ref_type != 'tag'
    uses: Vronst/workflows/.github/workflows/lint.yml@main

  # 3. Testing: Runs on normal branch pushes and PRs
  testing:
    if: github.ref_type != 'tag'
    uses: Vronst/workflows/.github/workflows/test.yml@main
    with:
      runner_type: "local"
      test_command: "uv run pytest && cargo test"
      setup_command: |
        pip install uv
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

  # 4. Auto PR Creation: Runs ONLY on pushes to 'stage' after testing/linting pass successfully
  auto-pr-generation:
    needs: [linting, testing]
    if: github.event_name == 'push' && github.ref == 'refs/heads/stage'
    uses: Vronst/workflows/.github/workflows/cd.yml@main
    with:
      head: "stage"
      base: "main"
      title: "Automated Release Pipeline: Merge stage into main"
      body: "This PR was automatically generated by the CI pipeline after linting and testing suites cleared successfully."
    secrets:
      TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 5. Documentation: Runs only when pushing to the main branch
  documentation:
    needs: [linting, testing]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: Vronst/workflows/.github/workflows/docs.yml@main

  # 6. Release Job: Runs ONLY when a version tag is pushed
  release:
    if: github.ref_type == 'tag'
    uses: Vronst/workflows/.github/workflows/release.yml@main
